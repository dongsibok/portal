<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설관리 대시보드</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg-main: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 레이아웃 구조 */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        /* 사이드바 디자인 */
        .brand {
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .brand h1 {
            font-size: 22px;
            color: var(--primary);
            font-weight: 800;
        }

        .brand p {
            font-size: 13px;
            color: var(--text-sub);
        }

        .nav-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        #category-nav {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            border: none;
            background: none;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* 메인 헤더 및 검색 */
        header {
            max-width: 1100px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            position: relative;
            width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* 콘텐츠 그리드 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .category-section {
            margin-bottom: 50px;
        }

        .category-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-header::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .link-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .link-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .link-desc {
            font-size: 14px;
            color: var(--text-sub);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 상태 표시 */
        .loading, .no-results {
            text-align: center;
            padding: 100px 0;
            color: var(--text-sub);
        }

        /* 반응형 */
        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .search-box { width: 300px; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 20px; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { padding: 20px; }
            header { flex-direction: column; gap: 20px; align-items: flex-start; }
            .search-box { width: 100%; }
            #category-nav { display: none; } /* 모바일은 사이드바 메뉴 생략 */
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <h1>시설관리 포털</h1>
            <p>Vision & Specialization</p>
        </div>
        
        <div class="nav-label">Categories</div>
        <nav id="category-nav">
            </nav>

        <footer style="margin-top: auto; padding-top: 20px; font-size: 12px; color: #94a3b8; border-top: 1px solid #f1f5f9;">
            문의: 기획운영팀 (내선 5404)
        </footer>
    </aside>

    <main class="main-content">
        <header>
            <h2 style="font-size: 26px; font-weight: 800;">시스템 바로가기</h2>
            <div class="search-box">
                <input type="search" id="searchInput" class="search-input" placeholder="시스템 또는 업무 검색...">
            </div>
        </header>

        <div id="link-container" class="container">
            <p class="loading">데이터를 불러오는 중입니다...</p>
        </div>
    </main>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxeE_LA7bXSM6Jjl9PhtagKcH-bPInsVWjnZRTbCosV0JrstRL78ZamxbIM98CTzzKY/exec';
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('로드 실패');
                allData = await response.json();
                displayData(allData);
            } catch (error) {
                console.error(error);
                document.getElementById('link-container').innerHTML = '<p class="no-results">데이터를 불러오지 못했습니다. 설정을 확인하세요.</p>';
            }
        }

        function displayData(data) {
            const container = document.getElementById('link-container');
            const nav = document.getElementById('category-nav');
            
            if (data.length === 0) {
                container.innerHTML = '<p class="no-results">검색 결과가 없습니다.</p>';
                return;
            }

            // 카테고리 그룹화
            const categories = {};
            data.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });

            // 메인 콘텐츠 생성
            let contentHtml = '';
            let navHtml = '';

            for (const [category, items] of Object.entries(categories)) {
                const safeId = category.replace(/\s+/g, '-'); // ID 생성용
                
                navHtml += `<button class="nav-btn" onclick="document.getElementById('${safeId}').scrollIntoView({behavior: 'smooth'})">${category}</button>`;
                
                contentHtml += `
                    <div class="category-section" id="${safeId}">
                        <div class="category-header">${category}</div>
                        <div class="links-grid">
                            ${items.map(item => `
                                <a href="${item.url}" target="_blank" rel="noopener" class="link-card">
                                    <div>
                                        <div class="link-name">${item.name}</div>
                                        <div class="link-desc">${item.description || ''}</div>
                                    </div>
                                    <div style="margin-top: 15px; font-size: 12px; color: var(--primary); font-weight: 600;">접속하기 →</div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = contentHtml;
            nav.innerHTML = navHtml;
        }

        // 실시간 검색
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(item => 
                item.category.toLowerCase().includes(term) ||
                item.name.toLowerCase().includes(term) ||
                item.description.toLowerCase().includes(term)
            );
            displayData(filtered);
        });

        loadData();
    </script>
</body>
</html>
