<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설관리 통합 포털</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-box {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: #667eea;
        }

        #link-container {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #dc3545;
            font-size: 1.1em;
        }

        .category-group {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .category-group:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .category-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.4em;
            font-weight: bold;
            padding: 15px 20px;
        }

        .category-content {
            padding: 20px;
        }

        .link-item {
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: background 0.2s, transform 0.2s;
        }

        .link-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .link-item:last-child {
            margin-bottom: 0;
        }

        .link-item a {
            font-weight: bold;
            color: #667eea;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .link-item a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .link-item p {
            margin-top: 8px;
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .external-icon::after {
            content: '↗';
            font-size: 0.8em;
            opacity: 0.7;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 1.1em;
        }

        .setup-instructions {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 30px;
        }

        .setup-instructions h3 {
            color: #856404;
            margin-bottom: 15px;
        }

        .setup-instructions ol {
            color: #856404;
            margin-left: 20px;
        }

        .setup-instructions li {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .setup-instructions code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .setup-instructions pre {
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 10px 0;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .category-title {
                font-size: 1.2em;
            }

            .link-item a {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 시설관리 통합 포털</h1>
            <p>모든 시설관리 시스템을 한 곳에서</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 시스템 이름, 카테고리, 설명으로 검색...">
        </div>

        <div id="link-container">
            <p class="loading">데이터를 로드하는 중...</p>
        </div>

        <footer>
            <p>© 2024 시설관리부 | 문의사항은 IT 헬프데스크로 연락주세요</p>
        </footer>
    </div>

    <script>
        // ===== 방법 1: Google Apps Script Web App 사용 (권장) =====
        // Google Apps Script로 배포한 웹 앱 URL을 사용합니다.
        // 아래 설정 가이드를 따라 WEB_APP_URL을 생성하세요.
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxeE_LA7bXSM6Jjl9PhtagKcH-bPInsVWjnZRTbCosV0JrstRL78ZamxbIM98CTzzKY/exec';
        
        // ===== 방법 2: JSONP 방식 (백업) =====
        // 만약 Apps Script를 사용할 수 없다면, 공개 CSV를 사용합니다.
        const SPREADSHEET_ID = '여기에_스프레드시트_ID_입력';
        const USE_APPS_SCRIPT = true; // true로 변경하면 Apps Script 사용

        let allData = [];

        // Apps Script로 데이터 로드
        async function loadDataFromAppsScript() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                allData = data;
                displayData(allData);
            } catch (error) {
                console.error('Error loading data:', error);
                displayError('apps-script');
            }
        }

        // CSV로 데이터 로드 (CORS 우회)
        async function loadDataFromCSV() {
            try {
                // Google Sheets를 CSV로 export
                const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
                const response = await fetch(CSV_URL);
                const text = await response.text();
                
                // CSV 파싱
                const lines = text.split('\n');
                allData = lines.slice(1) // 헤더 제외
                    .filter(line => line.trim())
                    .map(line => {
                        const values = parseCSVLine(line);
                        return {
                            category: values[0] || '',
                            name: values[1] || '',
                            url: values[2] || '',
                            description: values[3] || ''
                        };
                    })
                    .filter(item => item.category && item.name && item.url);

                displayData(allData);
            } catch (error) {
                console.error('Error loading data:', error);
                displayError('csv');
            }
        }

        // CSV 라인 파싱 (쉼표가 포함된 필드 처리)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }

        // 데이터 표시 함수
        function displayData(data) {
            const container = document.getElementById('link-container');
            
            if (data.length === 0) {
                container.innerHTML = '<p class="no-results">검색 결과가 없습니다.</p>';
                return;
            }

            // 카테고리별로 그룹화
            const categories = {};
            data.forEach(item => {
                if (!categories[item.category]) {
                    categories[item.category] = [];
                }
                categories[item.category].push(item);
            });

            // HTML 생성
            let html = '';
            for (const [category, items] of Object.entries(categories)) {
                html += `
                    <div class="category-group">
                        <div class="category-title">${category}</div>
                        <div class="category-content">
                            ${items.map(item => `
                                <div class="link-item">
                                    <a href="${item.url}" target="_blank" class="external-icon">${item.name}</a>
                                    <p>${item.description}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // 에러 표시 함수
        function displayError(method) {
            const container = document.getElementById('link-container');
            
            let instructions = '';
            
            if (method === 'apps-script') {
                instructions = `
                    <div class="setup-instructions">
                        <h3>📋 Google Apps Script 설정 가이드</h3>
                        <ol>
                            <li><strong>Google Sheets 열기:</strong> 데이터가 있는 스프레드시트 열기</li>
                            <li><strong>Apps Script 에디터 열기:</strong> 확장 프로그램 → Apps Script</li>
                            <li><strong>코드 입력:</strong> 아래 코드를 복사하여 붙여넣기
<pre>function doGet() {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  const data = sheet.getDataRange().getValues();
  const headers = data[0];
  const rows = data.slice(1);
  
  const result = rows.map(row => {
    const obj = {};
    headers.forEach((header, index) => {
      obj[header] = row[index];
    });
    return obj;
  });
  
  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}</pre>
                            </li>
                            <li><strong>배포:</strong> 배포 → 새 배포 → 유형: 웹 앱 → 액세스 권한: "모든 사용자" → 배포</li>
                            <li><strong>URL 복사:</strong> 생성된 웹 앱 URL을 복사</li>
                            <li><strong>HTML 수정:</strong> <code>WEB_APP_URL</code> 변수에 URL 입력</li>
                            <li><strong>USE_APPS_SCRIPT:</strong> <code>true</code>로 변경</li>
                        </ol>
                    </div>
                `;
            } else {
                instructions = `
                    <div class="setup-instructions">
                        <h3>📋 CSV 방식 설정 가이드</h3>
                        <ol>
                            <li><strong>Google Sheets 공유:</strong> 파일 → 공유 → "링크가 있는 모든 사용자" → 뷰어</li>
                            <li><strong>스프레드시트 ID 복사:</strong> URL에서 ID 부분 복사
                                <br><code>https://docs.google.com/spreadsheets/d/<strong>ID_부분</strong>/edit</code>
                            </li>
                            <li><strong>HTML 수정:</strong> <code>SPREADSHEET_ID</code> 변수에 ID 입력</li>
                            <li><strong>웹 서버 사용:</strong> 로컬 파일이 아닌 웹 서버에서 실행
                                <ul style="margin-top: 5px;">
                                    <li>간단한 Python 서버: <code>python -m http.server 8000</code></li>
                                    <li>접속: <code>http://localhost:8000/facility-portal.html</code></li>
                                </ul>
                            </li>
                        </ol>
                        <p style="margin-top: 15px; padding: 10px; background: #fff; border-radius: 5px;">
                            <strong>💡 권장:</strong> Apps Script 방식이 더 안정적입니다. CORS 문제가 없고 JSON 형식으로 깔끔하게 데이터를 받을 수 있습니다.
                        </p>
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="error">
                    <p>⚠️ 데이터 로딩에 실패했습니다.</p>
                    <p style="margin-top: 10px; font-size: 0.9em;">아래 설정 가이드를 확인해주세요.</p>
                </div>
                ${instructions}
            `;
        }

        // 검색 기능
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            if (searchTerm === '') {
                displayData(allData);
            } else {
                const filtered = allData.filter(item => 
                    item.category.toLowerCase().includes(searchTerm) ||
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.description.toLowerCase().includes(searchTerm)
                );
                displayData(filtered);
            }
        });

        // 페이지 로드 시 데이터 가져오기
        if (USE_APPS_SCRIPT) {
            loadDataFromAppsScript();
        } else {
            loadDataFromCSV();
        }
    </script>
</body>
</html>
